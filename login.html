<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - CoinFuture</title>
    <meta name="description" content="منصة CoinFuture لتداول العملات الرقمية - سجل الدخول للوصول إلى لوحة التداول">
    <meta name="keywords" content="تداول, عملات رقمية, CoinFuture, Bitcoin, Ethereum">
    <meta property="og:title" content="CoinFuture - منصة التداول الرقمية">
    <meta property="og:description" content="منصة متقدمة لتداول العملات الرقمية">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://coinfuture.com/login.html">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-page">
    <!-- Loading Animation -->
    <div id="loading">
        <div class="loader"></div>
        <p>جاري التحميل...</p>
    </div>

    <div class="login-container">
        <div class="login-card glass">
            <div class="login-header">
                <div class="logo">
                    <i class="fas fa-coins"></i>
                    <span>CoinFuture</span>
                </div>
                <h2>مرحباً بعودتك</h2>
                <p>سجل الدخول للوصول إلى لوحة التداول الخاصة بك</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email"><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
                    <input type="email" id="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> كلمة المرور</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> تذكرني
                    </label>
                    <a href="#" class="forgot-password">نسيت كلمة المرور؟</a>
                </div>
                <button type="submit" class="btn-primary btn-block">تسجيل الدخول</button>
                <p id="loginError" class="error-message"></p>
                <p class="signup-link">ليس لديك حساب؟ <a href="#">إنشاء حساب</a></p>
            </form>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
